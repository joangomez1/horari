name: PVCat Automation Bot

on:
  schedule:
    - cron: "*/5 * * * 1-5"   # cada 5 minuts, dilluns-divendres
  workflow_dispatch:

jobs:
  punch-clock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Check time in Spain and decide action
        id: timecheck
        run: |
          HOUR=$(TZ="Europe/Madrid" date +'%H')
          MIN=$(TZ="Europe/Madrid" date +'%M')
          TODAY=$(TZ="Europe/Madrid" date +'%Y-%m-%d')

          echo "Ara són: $HOUR:$MIN"

          # Fitxer temporal per evitar duplicats
          FILE="/tmp/time_tracking_$TODAY"

          if [ "$HOUR" = "10" ] && [ "$MIN" -lt "10" ]; then
            if [ ! -f "$FILE-entrada" ]; then
              echo "entrada" > "$FILE-entrada"
              echo "action=entrada" >> $GITHUB_OUTPUT
            else
              echo "action=none" >> $GITHUB_OUTPUT
            fi

          elif [ "$HOUR" = "17" ] && [ "$MIN" -lt "10" ]; then
            if [ ! -f "$FILE-sortida" ]; then
              echo "sortida" > "$FILE-sortida"
              echo "action=sortida" >> $GITHUB_OUTPUT
            else
              echo "action=none" >> $GITHUB_OUTPUT
            fi

          else
            echo "action=none" >> $GITHUB_OUTPUT
          fi

      - name: Execute punch-clock script for entry
        if: steps.timecheck.outputs.action == 'entrada'
        env:
          USER_PVCAT: ${{ secrets.USER_PVCAT }}
          PASS_PVCAT: ${{ secrets.PASS_PVCAT }}
        run: python fichar.py entrada

      - name: Execute punch-clock script for exit
        if: steps.timecheck.outputs.action == 'sortida'
        env:
          USER_PVCAT: ${{ secrets.USER_PVCAT }}
          PASS_PVCAT: ${{ secrets.PASS_PVCAT }}
        run: python fichar.py sortida
